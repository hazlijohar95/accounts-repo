name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: accounts_repo
          POSTGRES_PASSWORD: accounts_repo
          POSTGRES_DB: accounts_repo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U accounts_repo -d accounts_repo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rust tests
        env:
          DATABASE_URL: postgres://accounts_repo:accounts_repo@127.0.0.1:5432/accounts_repo
        run: cargo test

      - name: Auth service typecheck
        env:
          DATABASE_URL: postgres://accounts_repo:accounts_repo@127.0.0.1:5432/accounts_repo
        run: pnpm test:auth

      - name: Frontend tests
        run: pnpm test

      - name: Frontend build
        run: pnpm build

      - name: Install Playwright browser
        run: pnpm --dir frontend exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm e2e
