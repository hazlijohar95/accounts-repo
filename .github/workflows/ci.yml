name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rust tests
        run: cargo test

      - name: Auth service typecheck
        run: pnpm test:auth

      - name: Frontend tests
        run: pnpm test

      - name: Frontend build
        run: pnpm build

      - name: Install Playwright browser
        run: pnpm --dir frontend exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm e2e
