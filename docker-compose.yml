services:
  postgres:
    image: postgres:16-alpine
    container_name: accounts-repo-postgres
    environment:
      POSTGRES_USER: accounts_repo
      POSTGRES_PASSWORD: accounts_repo
      POSTGRES_DB: accounts_repo
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accounts_repo -d accounts_repo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
